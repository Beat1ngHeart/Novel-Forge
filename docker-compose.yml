name: novel-forge

services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-novel_forge}
      POSTGRES_USER: ${POSTGRES_USER:-novel_forge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-novel_forge}"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
